# DuckDB — embedded analytical database (no server needed)
# This starts a lightweight container for CLI + JDBC testing
#
# Usage:
#   docker compose -f docker-compose-duckdb.yml up -d
#   docker compose -f docker-compose-duckdb.yml exec duckdb ./duckdb
#
# JDBC connection: jdbc:duckdb:    (in-memory)
#                  jdbc:duckdb:/data/test.db  (persistent)

services:
  duckdb:
    image: duckdb/duckdb:v1.2.0
    container_name: duckdb_test
    entrypoint: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    init: true
    volumes:
      - duckdb-data:/data

volumes:
  duckdb-data:
